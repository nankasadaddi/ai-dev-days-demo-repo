name: Update Databricks Repo on PR Merge to Master

on:
  push:
    branches:
      - main

jobs:
  update-repo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
    
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
    
      - name: Sync Databricks Repo
        run: |
          python -c "
          import requests
          import json
          
          # Configuration
          DATABRICKS_URL = 'https://adb-541623100598197.17.azuredatabricks.net'
          TOKEN = 'dapie5fdc595f8cfcf8e2ba5c5d01009b3cf'
          GIT_REPO_URL = 'https://github.com/nankasadaddi/ai-dev-days-demo-repo.git'
          DATABRICKS_REPO_PATH = '/Repos/nankasadaddi@barracuda.com/ai-dev-days-demo-repo'
          BRANCH = 'main'
          
          headers = {
              'Authorization': f'Bearer {TOKEN}',
              'Content-Type': 'application/json'
          }
          
          # Check if repo already exists
          response = requests.get(f'{DATABRICKS_URL}/api/2.0/repos', headers=headers)
          repos = response.json().get('repos', [])
          
          existing_repo = None
          for repo in repos:
              if repo.get('path') == DATABRICKS_REPO_PATH:
                  existing_repo = repo
                  break
          
          if existing_repo:
              # Repo exists - update to latest branch
              repo_id = existing_repo['id']
              print(f'Repo found with ID: {repo_id}. Updating to branch: {BRANCH}')
              
              response = requests.patch(
                  f'{DATABRICKS_URL}/api/2.0/repos/{repo_id}',
                  headers=headers,
                  data=json.dumps({'branch': BRANCH})
              )
          else:
              # Repo doesn't exist - create it
              print(f'Repo not found. Creating new repo at: {DATABRICKS_REPO_PATH}')
              
              payload = {
                  'url': GIT_REPO_URL,
                  'provider': 'gitHub',
                  'path': DATABRICKS_REPO_PATH
              }
              
              response = requests.post(
                  f'{DATABRICKS_URL}/api/2.0/repos',
                  headers=headers,
                  data=json.dumps(payload)
              )
          
          # Check result
          if response.status_code == 200:
              print('Success:', response.json())
          else:
              print(f'Failed: {response.status_code} - {response.text}')
              exit(1)
          "
