name: Update Databricks Repo on PR Merge to Master

on:
  push:
    branches:
      - main

jobs:
  update-repo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
    
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
    
      - name: Run Databricks Repo Update Script
        run: |
          python -c "
          import requests
          import json
          
          # Hardcoded values (NOT RECOMMENDED for TOKEN)
          DATABRICKS_URL = 'https://adb-3961866957937656.16.azuredatabricks.net/browse?o=3961866957937656'
          TOKEN = 'dapiabe7e61c0da51195e8b6b11752dc5c9c'
          repo_id = '1290822242064119'
          new_branch_or_tag = 'main'
          
          endpoint = f'{DATABRICKS_URL}/api/2.0/repos/{repo_id}'
          payload = {'branch': new_branch_or_tag}
          
          headers = {
              'Authorization': f'Bearer {TOKEN}',
              'Content-Type': 'application/json'
          }
          
          response = requests.patch(endpoint, headers=headers, data=json.dumps(payload))
          
          if response.status_code == 200:
              print('Repository updated successfully:', response.json())
          else:
              print(f'Failed to update repo: {response.status_code} - {response.text}')
              exit(1)
          "
